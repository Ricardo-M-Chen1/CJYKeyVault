<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全密码管理器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🔐 安全密码管理器</div>
            <div class="sync-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">未同步</span>
            </div>
        </header>
        <main>
            <div class="password-list">
                <div class="list-header">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索账号或网站...">
                    </div>
                    <button class="btn btn-primary" onclick="openAddModal()">+ 添加密码</button>
                </div>
                <div id="passwordListContainer"></div>
            </div>
            <div class="sidebar">
                <div class="card">
                    <h3 class="card-title">生成强密码</h3>
                    <div class="password-generator">
                        <input type="text" id="generatedPassword" readonly placeholder="点击生成">
                        <button class="btn btn-primary" onclick="generatePassword()">生成</button>
                    </div>
                    <div class="form-group">
                        <label>密码长度</label>
                        <input type="number" id="passwordLength" value="16" min="8" max="32">
                    </div>
                    <div class="form-group">
                        <label>包含选项</label>
                        <div>
                            <input type="checkbox" id="includeUppercase" checked>
                            <label for="includeUppercase">大写字母</label>
                            <input type="checkbox" id="includeLowercase" checked>
                            <label for="includeLowercase">小写字母</label>
                            <input type="checkbox" id="includeNumbers" checked>
                            <label for="includeNumbers">数字</label>
                            <input type="checkbox" id="includeSymbols">
                            <label for="includeSymbols">特殊符号</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>加密方式</label>
                        <select id="encryptType">
                            <option value="xor">异或加密 (XOR)</option>
                            <option value="aes">AES加密</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>加密密钥</label>
                        <input type="password" id="encryptKey" placeholder="输入加密密钥，用于查看/同步">
                    </div>
                </div>
                <div class="card sync-section">
                    <h3 class="card-title">百度网盘同步</h3>
                    <button class="btn btn-primary sync-btn" onclick="syncWithBaidu()">同步到百度网盘</button>
                    <button class="btn btn-primary sync-btn" onclick="syncFromBaidu()">从百度网盘恢复</button>
                </div>
            </div>
        </main>
    </div>
    <!-- 添加/编辑密码模态框 -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加密码</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="passwordForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>网站/应用名称</label>
                    <input type="text" id="siteName" required>
                </div>
                <div class="form-group">
                    <label>用户名/邮箱</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <input type="text" id="notes">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">保存</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
